name: release
on:
  workflow_dispatch:
    inputs:
      test_version:
        description: "Test version (manual dispatch without a tag)"
        required: false
        default: ""
  push:
    tags:
      - '*.*.*'
env:
  APP_NAME: 'tim'
  NIM_VERSION: '2.2.0'
  MAINTAINER: 'OpenPeeps'
jobs:
  build-artifact:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          # - windows-latest
          # - macOS-latest
    steps:
      - uses: actions/checkout@v1
      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: ${{ env.NIM_VERSION }}
      - run: choosenim show path -y

      - name: "Install language runtime dependencies"
        if: runner.os != 'Windows'
        run: |
          if [[ "${{ runner.os }}" == Linux ]]; then
            sudo apt-get update
            sudo apt-get install -y \
              libluajit-5.1-dev luajit \
              php-cli php-dev \
              ruby ruby-dev \
              python3 python3-dev python3-pip
          elif [[ "${{ runner.os }}" == macOS ]]; then
            brew install \
              luajit \
              php \
              ruby \
              python3
          fi

      - name: "Install cmake-js for building node bindings"
        run: "npm install cmake-js -g"

      - name: "Install Denim + Clue"
        run: |
          nimble install -y denim@#head
          nimble install -y clue@#head

      - name: "Build tim CLI"
        run: nimble build -Y -d:release

      - name: "Build Node.js addon"
        run: denim build src/tim.nim -r -y --cmake

      - name: "Build PHP extension"
        if: runner.os != 'Windows'
        run: nimble php

      - name: "Build Ruby extension"
        if: runner.os != 'Windows'
        run: nimble ruby

      - name: "Build Python extension"
        if: runner.os != 'Windows'
        run: nimble python

      - name: "Build Lua extension"
        if: runner.os != 'Windows'
        run: nimble lua

      - name: "Create artifact"
        run: |
          os="${{ runner.os }}"
          assets="${{ env.APP_NAME }}_$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')"
          echo "$assets"
          mkdir -p "dist/$assets"
          cp -r bin LICENSE README.* "dist/$assets/"
          mkdir -p "dist/$assets/extensions"
          if [[ "${{ runner.os }}" != Windows ]]; then
            cp build/tim_php.so "dist/$assets/extensions/" 2>/dev/null || true
            cp build/Tim.bundle "dist/$assets/extensions/" 2>/dev/null || true
            cp build/tim.so "dist/$assets/extensions/tim_python.so" 2>/dev/null || true
            cp build/tim.so "dist/$assets/extensions/tim_lua.so" 2>/dev/null || true
          fi
          if test -f bin/tim.node; then
            cp bin/tim.node "dist/$assets/extensions/" 2>/dev/null || true
          fi
          (
            cd dist
            if [[ "${{ runner.os }}" == Windows ]]; then
              7z a "$assets.zip" "$assets"
            else
              tar czf "$assets.tar.gz" "$assets"
            fi
            ls -lah *.*
          )
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  create-release:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs:
      - build-artifact
    steps:
      - uses: actions/checkout@v1
      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ github.ref }}
          body: Release
          draft: false
          prerelease: false

      - name: Write upload_url to file
        run: echo '${{ steps.create-release.outputs.upload_url }}' > upload_url.txt

      - uses: actions/upload-artifact@v4
        with:
          name: create-release
          path: upload_url.txt

  upload-release:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name_suffix: linux.tar.gz
            asset_content_type: application/gzip
          # - os: windows-latest
          #   asset_name_suffix: windows.zip
          #   asset_content_type: application/zip
          # - os: macOS-latest
          #   asset_name_suffix: macos.tar.gz
          #   asset_content_type: application/gzip
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: artifact-${{ matrix.os }}

      - uses: actions/download-artifact@v3
        with:
          name: create-release

      - id: vars
        run: |
          echo "::set-output name=upload_url::$(cat upload_url.txt)"

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.vars.outputs.upload_url }}
          asset_path: ${{ env.APP_NAME }}_${{ matrix.asset_name_suffix }}
          asset_name: ${{ env.APP_NAME }}_${{ matrix.asset_name_suffix }}
          asset_content_type: ${{ matrix.asset_content_type }}

  ruby-gem:
    runs-on: ${{ matrix.runner }}
    if: runner.os != 'Windows'
    strategy:
      matrix:
        include:
          - runner: macos-13
            arch: x86_64-darwin
            ext: bundle
          - runner: macos-latest
            arch: arm64-darwin
            ext: bundle
          - runner: ubuntu-22.04
            arch: x86_64-linux
            ext: so
    steps:
      - name: "Resolve version"
        run: |
          VERSION="${{ github.event.inputs.test_version || github.ref_name }}"
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          path: tim-main

      - uses: actions/checkout@v4
        with:
          repository: tim-engine/tim-ruby
          token: ${{ secrets.TIM_EXT_PAT }}
          path: tim-ruby

      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: ${{ env.NIM_VERSION }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '>= 3.0'

      - name: "Set Ruby pkg-config path"
        run: |
          ruby -rrbconfig -e '
            libdir = RbConfig::CONFIG["libdir"]
            pkgconfig_dir = File.join(libdir, "pkgconfig")
            if File.directory?(pkgconfig_dir)
              puts "PKG_CONFIG_PATH=#{pkgconfig_dir}"
            end
          ' >> $GITHUB_ENV

      - name: "Install language runtime dependencies"
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev

      - name: "Install Clue"
        run: nimble install -y clue@#head
        working-directory: tim-main

      - name: "Build Ruby extension"
        run: nimble ruby
        working-directory: tim-main

      - name: "Copy binary to tim-ruby"
        run: |
          platform="${{ matrix.arch }}"
          ext="${{ matrix.ext }}"
          mkdir -p tim-ruby/lib
          cp tim-main/build/Tim.bundle "tim-ruby/lib/tim_engine-${platform}.${ext}"

      - name: "Update gemspec version"
        run: |
          cd tim-ruby
          sed -i "s/s.version.*=.*\".*\"/s.version     = \"${VERSION}\"/" tim.gemspec

      - name: "Commit and push to tim-ruby"
        if: env.VERSION != '' && env.VERSION != 'main'
        run: |
          cd tim-ruby
          git config user.name "OpenPeeps Bot"
          git config user.email "bot@openpeeps.dev"
          git add -A
          git commit -m "Tim Engine v${VERSION} (${{ matrix.arch }})" || echo "Nothing to commit"
          git tag -f "v${VERSION}"
          git push origin main --tags
