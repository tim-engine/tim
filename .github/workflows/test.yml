name: test
on:
  push:
    branches:
      - '**'
    paths-ignore:
      - LICENSE
      - README.*
      - examples
  pull_request:
    paths-ignore:
      - LICENSE
      - README.*
      - examples
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nim-version:
          - '2.2.0'
    steps:
      - uses: actions/checkout@v3
      
      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: ${{ matrix.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Install language runtime dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libluajit-5.1-dev luajit \
            php-cli php-dev \
            ruby ruby-dev \
            python3 python3-dev python3-pip

      - name: Install cmake-js for building node bindings"
        run: "npm install cmake-js -g"

      - name: "Install Denim for building node bindings"
        run: "nimble install -y denim@#head"

      - name: "Install Clue for building native extensions"
        run: "nimble install -y clue@#head"

      - name: "Install & test via Nimble"
        run: |
          nimble install -Y
          nimble test

      - name: "Build Node addon via Denim"
        run: denim build src/${{ github.event.repository.name }}.nim -r -y --cmake

      - name: "Build PHP extension"
        run: nimble php

      - name: "Build Ruby extension"
        run: nimble ruby

      - name: "Build Python extension"
        run: nimble python

      - name: "Build Lua extension"
        run: nimble lua

      - name: "Test PHP showcase"
        run: php -d extension=build/tim_php.so -r 'echo extension_loaded("tim") ? "PHP OK\n" : "PHP FAIL\n";'

      - name: "Test Python showcase"
        run: python3 -c "import sys; sys.path.insert(0,'build'); import tim; print('Python OK')"

      - name: "Update Tim addon for Node.js"
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          timNodeName="tim-$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]').node"
          git pull origin main
          git checkout .
          if test -f ./bindings/node/tim/src/bin/$timNodeName; then
            rm -f ./bindings/node/tim/src/bin/$timNodeName
            git add -f ./bindings/node/tim/src/bin/$timNodeName
            git commit -m "cleanup previous tim.node" || true
          fi
          cp ./bin/tim.node ./bindings/node/tim/src/bin/$timNodeName
          git status
          git add -f ./bindings/node/tim/src/bin/$timNodeName
          git commit -m "update tim addon for nodejs on ${{ runner.os }}" || true
      - name: Push changes # push the output folder to your repo
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: 'main'
